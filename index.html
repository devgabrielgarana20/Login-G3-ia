<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Login · Minimal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background"></div>

  <div class="glass-card" id="appContainer">
    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="screen active">
      <div class="brand"></div>
      <h2 class="screen-title">Bem-vindo de volta</h2>
      <p class="screen-subtitle">Entre com suas credenciais</p>

      <form id="loginForm" autocomplete="off">
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="loginEmail" placeholder="E-mail" required>
        </div>
        <div class="input-group password-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="loginPassword" placeholder="Senha" required>
          <i class="fas fa-eye toggle-password" data-target="loginPassword"></i>
        </div>

        <div class="options-row">
          <label class="remember">
            <input type="checkbox" id="rememberMe"> <span>Lembre-me</span>
          </label>
          <a href="#" class="forgot-link" id="forgotLink">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn primary" id="loginBtn">
          <span class="btn-text">Entrar</span>
          <span class="btn-spinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
        </button>

        <div style="display:flex; gap:10px; margin-top:0.5rem;">
          <button type="button" class="btn" id="adminRedirectBtn" style="flex:1; background:rgba(255,200,100,0.2); border-color:rgba(255,200,100,0.3);">
            <i class="fas fa-user-shield"></i> Painel Admin
          </button>
        </div>

        <p class="switch-action">
          Não tem uma conta? <a href="#" id="showRegisterLink">Criar conta</a>
        </p>
      </form>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="registerScreen" class="screen">
      <div class="brand"></div>
      <h2 class="screen-title">Criar conta</h2>
      <p class="screen-subtitle">Preencha os dados para começar</p>

      <form id="registerForm" autocomplete="off">
        <div class="input-group">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="regName" placeholder="Nome completo" required>
        </div>
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="regEmail" placeholder="E-mail" required>
        </div>
        <div class="input-group password-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="regPassword" placeholder="Senha (mín. 6 caracteres)" required>
          <i class="fas fa-eye toggle-password" data-target="regPassword"></i>
        </div>
        <div class="input-group password-group">
          <i class="fas fa-check input-icon"></i>
          <input type="password" id="regConfirm" placeholder="Confirmar senha" required>
          <i class="fas fa-eye toggle-password" data-target="regConfirm"></i>
        </div>

        <button type="submit" class="btn primary" id="registerBtn">
          <span class="btn-text">Cadastrar</span>
          <span class="btn-spinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
        </button>

        <p class="switch-action">
          Já tem conta? <a href="#" id="showLoginLink">Fazer login</a>
        </p>
      </form>
    </div>

    <!-- MENSAGEM -->
    <div id="messageBox" class="message-box"></div>
  </div>

  <!-- MODAL RECUPERAR SENHA (simples) -->
  <div id="forgotModal" class="modal">
    <div class="modal-content glass-card">
      <span class="modal-close">&times;</span>
      <h3>Recuperar senha</h3>
      <p>Digite seu e-mail para receber um link de redefinição.</p>
      <input type="email" id="resetEmail" placeholder="Seu e-mail" class="modal-input">
      <button id="resetBtn" class="btn primary">Enviar link</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
